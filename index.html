<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐼 Panda Tools - Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; background-color: #09090e; font-family: 'Poppins', sans-serif;
            height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; overflow: hidden;
        }
        
        /* Efecto de fondo sutil para mantener tu estética */
        .bg-auras { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none; }
        .aura { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.4; }
        .aura-1 { width: 40vw; height: 40vw; background: #8b5cf6; top: -10%; left: -10%; }
        .aura-2 { width: 35vw; height: 35vw; background: #10b981; bottom: -10%; right: -10%; }

        h1 { font-size: 4rem; margin-bottom: 50px; letter-spacing: 2px; text-align: center; text-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 span { background: linear-gradient(to right, #ffffff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .hub-grid { display: flex; gap: 30px; flex-wrap: wrap; justify-content: center; max-width: 900px; }

        /* Tarjetas de los botones */
        .tool-card {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px); border-radius: 24px; padding: 40px; text-decoration: none;
            color: white; display: flex; flex-direction: column; align-items: center; width: 280px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        .tool-card:hover { transform: translateY(-10px); background: rgba(255, 255, 255, 0.08); }
        .tool-card.commander:hover { border-color: #8b5cf6; box-shadow: 0 20px 40px rgba(139, 92, 246, 0.3); }
        .tool-card.timer:hover { border-color: #10b981; box-shadow: 0 20px 40px rgba(16, 185, 129, 0.3); }

        .tool-icon { font-size: 5rem; margin-bottom: 20px; }
        .tool-title { font-size: 1.8rem; font-weight: 800; margin: 0 0 10px 0; text-transform: uppercase; }
        .tool-desc { color: #94a3b8; text-align: center; font-size: 0.95rem; line-height: 1.5; margin: 0; }
    </style>
</head>
<body>

    <div class="bg-auras"><div class="aura aura-1"></div><div class="aura aura-2"></div></div>

    <h1>🐼 PANDA <span>TOOLS</span></h1>

   <div class="hub-grid">
        <a href="commander.html" target="_blank" class="tool-card commander">
            <div class="tool-icon">🐉</div>
            <h2 class="tool-title">Liga MTG</h2>
            <p class="tool-desc">Gestión integral de jugadores, emparejamientos Suizos y clasificaciones en vivo.</p>
        </a>

        <a href="timer.html" target="_blank" class="tool-card timer">
            <div class="tool-icon">⏱️</div>
            <h2 class="tool-title">Timer Pro</h2>
            <p class="tool-desc">Reloj de torneos de TCG con alertas de tiempo, atajos de teclado y fondos animados.</p>
        </a>
    </div>

</body>
</html>
