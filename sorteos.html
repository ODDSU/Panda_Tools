<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panda Tools - Sorteos Premium</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        /* =========================================
           LAYOUT Y MODO PRESENTADOR / TV
           ========================================= */
        body { overflow: hidden; background-color: var(--bg-dark); }
        
        .layout-grid { 
            display: flex; flex-wrap: wrap; gap: 40px; margin-top: 2vh; 
            align-items: center; height: 75vh; transition: all 0.5s ease;
        }
        
        .panel-nombres { 
            flex: 1; min-width: 320px; max-width: 400px; display: flex; flex-direction: column; gap: 15px; 
            background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px); border-radius: 24px; padding: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); transition: all 0.4s ease;
        }

        .panel-ruleta { 
            flex: 2; min-width: 400px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; position: relative; 
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }        

        /* MODO PRESENTADOR Y TV */
        body.presenter-mode .panel-nombres { 
            opacity: 0; transform: translateX(-50px); pointer-events: none; 
            position: absolute; visibility: hidden; 
        }
        body.presenter-mode .panel-ruleta { flex: 1; transform: scale(1.1); }
        
        /* Arreglo del hueco invisible */
        body.modo-tv h1 { display: none !important; }
        body.presenter-mode h1 { opacity: 0; height: 0; margin: 0; overflow: hidden; }

        body.modo-tv .panel-nombres, body.modo-tv .btn-ruleta-actions { display: none !important; }
        body.modo-tv .layout-grid { margin: 0; padding: 0; height: 100vh; display: flex; align-items: center; justify-content: center; }
        body.modo-tv .panel-ruleta { transform: translateY(-3vh); } /* Compensación visual para el puntero */

        /* Auto-Hide Menú Superior */
        .top-hover-zone { position: fixed; top: 0; left: 0; width: 100%; height: 60px; z-index: 9999; display: none; }
        body.modo-tv .top-hover-zone, body.presenter-mode .top-hover-zone { display: block; }

        body.modo-tv .tabs-nav, body.presenter-mode .tabs-nav {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            display: flex !important; z-index: 10000; opacity: 0; transition: all 0.3s ease;
            background: rgba(0, 0, 0, 0.85); border: 1px solid rgba(255,255,255,0.1); padding: 10px 15px;
            border-radius: 20px; box-shadow: 0 15px 30px rgba(0,0,0,0.5); backdrop-filter: blur(10px);
        }

        body.modo-tv .top-hover-zone:hover + .tabs-nav, body.modo-tv .tabs-nav:hover,
        body.presenter-mode .top-hover-zone:hover + .tabs-nav, body.presenter-mode .tabs-nav:hover {
            top: 20px; opacity: 1;
        }

        /* =========================================
           ESTÉTICA DE LA RULETA
           ========================================= */
        .ruleta-container { 
            position: relative; width: max-content; margin: 0 auto; 
            filter: drop-shadow(0 25px 50px rgba(0,0,0,0.6)); 
        }
        
        .puntero {
            position: absolute; top: -20px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 25px solid transparent; border-right: 25px solid transparent; border-top: 50px solid var(--accent);
            filter: drop-shadow(0 8px 10px rgba(0,0,0,0.6)); z-index: 10;
        }
        body.modo-tv .puntero { border-left: 35px solid transparent; border-right: 35px solid transparent; border-top: 70px solid var(--accent); top: -30px; }

        canvas#ruleta { 
            border-radius: 50%; border: 8px solid rgba(255, 255, 255, 0.15); 
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8), 0 0 0 2px rgba(0,0,0,0.5); 
        }
        body.modo-tv canvas#ruleta { border-width: 12px; }
        
        /* Botón Épico de Girar */
        .btn-girar-gigante {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white; border: none; border-radius: 20px;
            font-size: 1.8rem; font-weight: 900; letter-spacing: 2px;
            padding: 20px 40px; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.4), inset 0 2px 0 rgba(255,255,255,0.2);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: pulse-glow 2s infinite; margin-top: 30px; width: 100%; max-width: 400px;
        }

        .btn-girar-gigante:hover { transform: translateY(-5px) scale(1.05); box-shadow: 0 15px 40px rgba(16, 185, 129, 0.6); }
        .btn-girar-gigante:active { transform: translateY(2px) scale(0.98); }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { box-shadow: 0 0 0 25px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        /* =========================================
           WIDGETS INTERNOS Y MODALES
           ========================================= */
        .lista-participantes { 
            max-height: 220px; overflow-y: auto; background: rgba(0,0,0,0.4); 
            border-radius: 12px; padding: 12px; border: 1px solid rgba(255,255,255,0.05); 
        }
        .participante-item { 
            display: inline-flex; align-items: center; gap: 8px; 
            background: rgba(139, 92, 246, 0.15); border: 1px solid rgba(139, 92, 246, 0.3); 
            padding: 6px 14px; border-radius: 20px; font-size: 13px; margin: 4px; color: #e2e8f0; 
            transition: all 0.2s;
        }
        .participante-item:hover { background: rgba(139, 92, 246, 0.3); border-color: var(--primary); }

        #confeti-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 999999; }
        
        /* MODAL GANADOR PREMIUM */
        .modal-ganador-premium {
            background: linear-gradient(145deg, #1e1e28, #0f0f15);
            border: 2px solid var(--accent);
            box-shadow: 0 0 80px rgba(245, 158, 11, 0.3), inset 0 0 40px rgba(245, 158, 11, 0.1);
            border-radius: 30px; padding: 50px 40px; text-align: center;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            transform: scale(0);
        }

        .ganador-nombre { 
            font-size: 4.5rem; font-weight: 900; 
            background: linear-gradient(to bottom, #fffbeb, #f59e0b); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            text-align: center; margin: 15px 0 30px 0; 
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
        }

        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        /* ITEM LISTA MODAL PARTICIPANTES */
        .modal-lista-item {
            background: rgba(255,255,255,0.05); padding: 10px 20px; border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.1); color: white; font-weight: 600; font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="bg-auras">
        <div class="aura aura-1"></div>
        <div class="aura aura-2"></div>
        <div class="aura aura-3"></div>
    </div>
    <canvas id="confeti-canvas"></canvas>

    <!-- ZONA INVISIBLE DE ACTIVACIÓN DE MENÚ (Para Modo TV y Presentador) -->
    <div class="top-hover-zone"></div>
    
    <div class="tabs-nav">
        <button class="tab-btn" onclick="window.close()">⬅️ Volver al Hub</button>
        <button class="tab-btn active" style="border-color: var(--accent); color: var(--accent);">🎁 Ruleta</button>
        
        <button class="tab-btn" onclick="mostrarListaModal()" style="border-color: rgba(59, 130, 246, 0.4); color: #60a5fa; margin-left: 15px;">📜 Ver Participantes</button>

        <button class="tab-btn" id="btn-presentador" onclick="togglePresenterMode()" style="margin-left: auto; border-color: rgba(255,255,255,0.2);">✨ Modo Presentador</button>
    </div>

    <h1 style="margin-bottom: 0;">SORTEOS</h1>

    <div class="layout-grid">
        
        <!-- PANEL DE NOMBRES ESTILO DASHBOARD -->
        <div class="panel-nombres">
            <h2 style="color: var(--primary); margin-top: 0; font-size: 1.4rem;">👥 Participantes</h2>
            
            <div style="background: rgba(0,0,0,0.3); border: 1px solid rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 16px;">
                <label style="font-size: 11px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 8px;">📥 Origen de los datos:</label>
                
                <select id="fuente-importacion" onchange="cambiarFuenteImportacion()" style="width: 100%; box-sizing: border-box; margin-bottom: 12px; background: rgba(139, 92, 246, 0.1); border: 1px solid rgba(139, 92, 246, 0.3); color: white; border-radius: 8px; padding: 8px; outline: none;">
                    <option value="manual">✍️ Entrada Manual (Copiar y Pegar)</option>
                    <option value="commander">🐉 Liga MTG Commander</option>
                </select>

                <div id="bloque-manual">
                    <textarea id="input-nombres" placeholder="Pega aquí la lista de participantes..." rows="3" style="width: 100%; box-sizing: border-box; padding: 12px; background: rgba(0,0,0,0.5); color: white; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; font-family: inherit; resize: none; margin-bottom: 10px; outline: none;"></textarea>
                    <button class="btn-primary btn-purple" style="width: 100%; padding: 10px;" onclick="agregarParticipantes()">+ Añadir Nombres</button>
                </div>

                <div id="bloque-commander" style="display: none;">
                    <select id="jornada-commander" style="width: 100%; box-sizing: border-box; margin-bottom: 10px; padding: 8px; border-radius: 8px; background: rgba(0,0,0,0.5); color: white; border: 1px solid rgba(255,255,255,0.1); outline: none;">
                        <option value="">-- Selecciona una Jornada --</option>
                    </select>
                    <button class="btn-primary" style="width: 100%; padding: 10px; background: var(--secondary);" onclick="importarDeCommander()">📥 Extraer Jugadores</button>
                </div>
            </div>

            <div style="display: flex; gap: 10px; align-items: center; justify-content: space-between;">
                <p style="font-size: 13px; color: var(--text-muted); margin: 0;">En la ruleta: <strong id="contador-participantes" style="color: white; font-size: 16px;">0</strong></p>
                <button class="btn-secondary" style="padding: 6px 12px; font-size: 11px; color: #fca5a5; border-color: rgba(239, 68, 68, 0.3); background: rgba(239, 68, 68, 0.1);" onclick="limpiarParticipantes()">🗑️ Vaciar</button>
            </div>
            
            <div class="lista-participantes" id="contenedor-participantes"></div>
            
            <details style="background: rgba(0,0,0,0.2); border-radius: 8px; border: 1px solid rgba(255,255,255,0.05);">
                <summary style="padding: 10px; font-size: 11px; color: #94a3b8; text-transform: uppercase; font-weight: 700; cursor: pointer; display: flex; justify-content: space-between; outline: none; user-select: none;">
                    <span>⌨️ Atajos Rápidos</span> <span style="opacity: 0.5;">▼</span>
                </summary>
                <div style="padding: 0 10px 10px 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; font-size: 11px; color: #cbd5e1;">
                    <div><strong style="color: var(--primary);">[Espacio]</strong> Girar / Aceptar</div>
                    <div><strong style="color: var(--danger);">[Supr]</strong> Vaciar / Retirar</div>
                    <div><strong style="color: var(--primary);">[L]</strong> Ver lista apuntados</div>
                    <div><strong style="color: var(--primary);">[P]</strong> Modo Presentador</div>
                    <div><strong style="color: var(--primary);">[F]</strong> Fullscreen</div>
                    <div><strong style="color: var(--primary);">[T]</strong> Proyectar TV</div>
                </div>
            </details>
        </div>

        <!-- PANEL DE LA RULETA -->
        <div class="panel-ruleta">
            <div class="ruleta-container">
                <div class="puntero"></div>
                <canvas id="ruleta"></canvas>
            </div>
            
            <div class="btn-ruleta-actions" style="display: flex; flex-direction: column; align-items: center; width: 100%; margin-top: 20px;">
                <button class="btn-girar-gigante" id="btn-girar" onclick="girarRuleta(); this.blur()">
                    🎡 ¡GIRAR RULETA!
                </button>
                
                <div style="display: flex; gap: 15px; margin-top: 20px; width: 100%; max-width: 400px;">
                    <button class="btn-secondary" style="flex: 1;" onclick="toggleFullscreen(); this.blur()">⛶ Pantalla Completa</button>
                    <button class="btn-secondary" style="flex: 1; border-color: rgba(59, 130, 246, 0.4); color: #60a5fa;" onclick="abrirRuletaTV(); this.blur()">📺 Abrir TV (Espejo)</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL LISTA DE PARTICIPANTES -->
    <div id="modal-lista" class="modal-overlay" style="display: none; backdrop-filter: blur(8px); background: rgba(0,0,0,0.85); z-index: 100000;">
        <div class="modal-card" style="max-width: 700px; max-height: 85vh; display: flex; flex-direction: column; background: #0f0f15; border: 1px solid rgba(255,255,255,0.1);">
            <h3 style="margin-top: 0; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px;">
                📜 Participantes Apuntados (<span id="modal-lista-count">0</span>)
            </h3>
            <div id="modal-lista-content" style="overflow-y: auto; display: flex; flex-wrap: wrap; gap: 12px; padding: 15px 0; justify-content: center;">
                <!-- Se rellena por JS -->
            </div>
            <button class="btn-secondary" style="margin-top: 15px; width: 100%; padding: 15px; font-size: 1.1rem;" onclick="cerrarListaModal()">Cerrar Lista</button>
        </div>
    </div>

    <!-- MODAL GANADOR PREMIUM -->
    <div id="modal-overlay" class="modal-overlay" style="display: none; backdrop-filter: blur(8px); background: rgba(0,0,0,0.85); z-index: 100000;">
        <div class="modal-card modal-ganador-premium">
            <h3 style="margin-top: 0; color: var(--accent); text-transform: uppercase; letter-spacing: 4px; font-size: 1.2rem;">✨ ¡El ganador es! ✨</h3>
            <div id="nombre-ganador" class="ganador-nombre">NOMBRE</div>
            
            <div style="display: flex; gap: 15px; margin-top: 10px;">
                <button class="btn-primary" style="flex: 1; background: var(--success); font-size: 1.1rem; padding: 15px;" onclick="cerrarModalGanador()">🎉 Aceptar</button>
                <button class="btn-primary btn-danger" style="flex: 1; font-size: 1.1rem; padding: 15px;" onclick="eliminarGanador()" title="Retira a este jugador para que no le vuelva a tocar">🗑️ Retirar Jugador</button>
            </div>
        </div>
    </div>

    <!-- SCRIPT -->
    <script>
        const paletaColores = ['#8b5cf6', '#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#ec4899'];
        
        let participantes = JSON.parse(localStorage.getItem('panda_sorteos_nombres')) || [];
        let anguloActual = 0;
        let girando = false;
        let ultimoGanadorIndex = -1;
        let presenterMode = false;

        const canvas = document.getElementById('ruleta');
        const isTV = new URLSearchParams(window.location.search).get('tv') === 'true';

        function ajustarCanvas() {
            if (isTV) {
                document.body.classList.add('modo-tv');
                canvas.width = window.innerHeight * 0.75; 
                canvas.height = window.innerHeight * 0.75;
            } else if (presenterMode) {
                canvas.width = window.innerHeight * 0.65; 
                canvas.height = window.innerHeight * 0.65;
            } else {
                canvas.width = 450; 
                canvas.height = 450;
            }
            dibujarRuleta();
        }

        const ctx = canvas.getContext('2d');
        
        function togglePresenterMode() {
            presenterMode = !presenterMode;
            if (presenterMode) {
                document.body.classList.add('presenter-mode');
                document.getElementById('btn-presentador').style.background = 'rgba(255,255,255,0.2)';
                document.getElementById('btn-presentador').innerText = '❌ Salir Modo Presentador';
            } else {
                document.body.classList.remove('presenter-mode');
                document.getElementById('btn-presentador').style.background = 'transparent';
                document.getElementById('btn-presentador').innerText = '✨ Modo Presentador';
            }
            setTimeout(ajustarCanvas, 400); 
        }

        function cambiarFuenteImportacion() {
            const fuente = document.getElementById('fuente-importacion').value;
            document.getElementById('bloque-manual').style.display = 'none';
            document.getElementById('bloque-commander').style.display = 'none';

            if (fuente === 'manual') document.getElementById('bloque-manual').style.display = 'block';
            else if (fuente === 'commander') { document.getElementById('bloque-commander').style.display = 'block'; cargarJornadasCommander(); }
        }

        function cargarJornadasCommander() {
            const historial = JSON.parse(localStorage.getItem('commander_historial')) || [];
            const selectJornada = document.getElementById('jornada-commander');
            
            if (historial.length === 0) { selectJornada.innerHTML = '<option value="">No hay torneos registrados aún</option>'; return; }

            let fechasUnicas = new Set();
            historial.forEach(h => fechasUnicas.add(h.fecha.split(',')[0].trim()));
            let jornadasOrdenadas = Array.from(fechasUnicas).sort((a, b) => {
                let numA = a.match(/\d+/) ? parseInt(a.match(/\d+/)[0]) : NaN;
                let numB = b.match(/\d+/) ? parseInt(b.match(/\d+/)[0]) : NaN;
                if (!isNaN(numA) && !isNaN(numB)) return numA - numB;
                return a.localeCompare(b);
            });

            selectJornada.innerHTML = '<option value="">-- Elige la Jornada a importar --</option>';
            jornadasOrdenadas.forEach(fecha => { selectJornada.innerHTML += `<option value="${fecha}">📅 ${fecha}</option>`; });
        }

        function importarDeCommander() {
            const jornadaSeleccionada = document.getElementById('jornada-commander').value;
            if (!jornadaSeleccionada) { alert("Por favor, selecciona una jornada primero."); return; }

            const historial = JSON.parse(localStorage.getItem('commander_historial')) || [];
            let jugadoresEnJornada = new Set();

            historial.forEach(h => {
                let fecha = h.fecha.split(',')[0].trim();
                if (fecha === jornadaSeleccionada) h.resultados.forEach(r => jugadoresEnJornada.add(r.nombre));
            });

            let añadidos = 0;
            jugadoresEnJornada.forEach(nombre => { if (!participantes.includes(nombre)) { participantes.push(nombre); añadidos++; } });

            if (añadidos > 0) {
                guardarNombres();
                const btn = document.querySelector('#bloque-commander button');
                const textoOriginal = btn.innerHTML;
                btn.innerHTML = `✅ ¡${añadidos} Añadidos!`; btn.style.background = 'var(--success)';
                setTimeout(() => { btn.innerHTML = textoOriginal; btn.style.background = 'var(--secondary)'; }, 2500);
            } else { alert(`Todos los asistentes ya estaban en la ruleta.`); }
        }

        window.addEventListener('storage', (e) => {
            if (e.key === 'panda_sorteos_nombres') { participantes = JSON.parse(e.newValue) || []; actualizarUI(); dibujarRuleta(); }
            if (e.key === 'panda_sorteos_giro' && isTV) { const datos = JSON.parse(e.newValue); ejecutarGiroMatematico(datos.d, datos.g); }
        });

        document.addEventListener('keydown', function(e) {
            const modalGanadorAbierto = document.getElementById('modal-overlay').style.display === 'flex';
            const modalListaAbierto = document.getElementById('modal-lista').style.display === 'flex';

            if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') {
                if (e.ctrlKey && e.code === 'Enter') { e.preventDefault(); agregarParticipantes(); e.target.blur(); }
                return;
            }

            switch(e.code) {
                case 'Space':
                case 'Enter':
                    e.preventDefault();
                    if (modalListaAbierto) cerrarListaModal();
                    else if (modalGanadorAbierto) cerrarModalGanador(); 
                    else girarRuleta(); 
                    break;
                case 'Delete':
                case 'Backspace':
                    e.preventDefault();
                    if (modalGanadorAbierto) eliminarGanador(); 
                    else if (!modalListaAbierto) limpiarParticipantes(); 
                    break;
                case 'KeyF': e.preventDefault(); toggleFullscreen(); break;
                case 'KeyT': e.preventDefault(); abrirRuletaTV(); break;
                case 'KeyP': e.preventDefault(); togglePresenterMode(); break;
                case 'KeyL': 
                    e.preventDefault(); 
                    if (modalListaAbierto) cerrarListaModal();
                    else mostrarListaModal();
                    break;
            }
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) { document.documentElement.requestFullscreen().then(() => { setTimeout(ajustarCanvas, 200); }); } 
            else if (document.exitFullscreen) { document.exitFullscreen().then(() => { setTimeout(ajustarCanvas, 200); }); }
        }
        window.addEventListener('resize', ajustarCanvas);

        function abrirRuletaTV() { window.open('sorteos.html?tv=true', 'PandaRuletaTV'); }

        function guardarNombres() { localStorage.setItem('panda_sorteos_nombres', JSON.stringify(participantes)); actualizarUI(); dibujarRuleta(); }

        function agregarParticipantes() {
            const texto = document.getElementById('input-nombres').value;
            if (!texto.trim()) return;
            const nombresBrutos = texto.split(/[\n,]/);
            nombresBrutos.forEach(n => {
                let nombre = n.replace(/^[\d.)\-*•\s\u2060]+/, '').trim();
                nombre = nombre.replace(/[.\s]+$/, '').trim();
                if (nombre !== "" && !participantes.includes(nombre)) participantes.push(nombre);
            });
            document.getElementById('input-nombres').value = ''; guardarNombres();
        }

        function limpiarParticipantes() { if(confirm("¿Seguro que quieres vaciar la ruleta?")) { participantes = []; guardarNombres(); } }
        function borrarParticipante(index) { participantes.splice(index, 1); guardarNombres(); }
        function eliminarGanador() { if (ultimoGanadorIndex !== -1) { participantes.splice(ultimoGanadorIndex, 1); guardarNombres(); cerrarModalGanador(); } }

        function actualizarUI() {
            if (isTV) return; 
            document.getElementById('contador-participantes').innerText = participantes.length;
            const contenedor = document.getElementById('contenedor-participantes');
            if (participantes.length === 0) {
                contenedor.innerHTML = '<p style="color:#64748b; font-style:italic; font-size: 13px; text-align: center; margin-top: 20px;">Aún no hay nadie en la ruleta.</p>';
            } else {
                contenedor.innerHTML = participantes.map((p, index) => 
                    `<span class="participante-item">${p} <b style="cursor: pointer; color: #fca5a5; opacity: 0.5; margin-left: 5px; font-size: 10px;" onclick="borrarParticipante(${index})" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.5'">✖</b></span>`
                ).join('');
            }
        }

        function mostrarListaModal() {
            const countEl = document.getElementById('modal-lista-count');
            const contentEl = document.getElementById('modal-lista-content');
            countEl.innerText = participantes.length;
            
            if (participantes.length === 0) {
                contentEl.innerHTML = '<p style="color:#94a3b8; font-size: 1.2rem; margin: 30px 0;">La ruleta está vacía.</p>';
            } else {
                const ordenados = [...participantes].sort((a, b) => a.localeCompare(b));
                contentEl.innerHTML = ordenados.map(p => `<span class="modal-lista-item">${p}</span>`).join('');
            }
            
            document.getElementById('modal-lista').style.display = 'flex';
        }

        function cerrarListaModal() { document.getElementById('modal-lista').style.display = 'none'; }

        function dibujarRuleta() {
            const centerX = canvas.width / 2; const centerY = canvas.height / 2; const radius = centerX - 12;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (participantes.length === 0) {
                ctx.beginPath(); ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
                ctx.fillStyle = 'rgba(255,255,255,0.02)'; ctx.fill();
                ctx.fillStyle = '#64748b'; ctx.font = `bold ${Math.max(16, radius * 0.1)}px Poppins`;
                ctx.textAlign = 'center'; ctx.fillText('AÑADE NOMBRES', centerX, centerY); return;
            }
            
            const arco = (2 * Math.PI) / participantes.length;
            const sizeTexto = Math.max(14, radius * 0.085);

            participantes.forEach((participante, i) => {
                const anguloInicio = anguloActual + i * arco;
                const anguloFin = anguloInicio + arco;
                ctx.beginPath(); ctx.moveTo(centerX, centerY); ctx.arc(centerX, centerY, radius, anguloInicio, anguloFin);
                ctx.fillStyle = paletaColores[i % paletaColores.length]; ctx.fill(); 
                ctx.strokeRect = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 1; ctx.stroke();

                ctx.save(); ctx.translate(centerX, centerY); ctx.rotate(anguloInicio + arco / 2);
                ctx.textAlign = 'right'; ctx.fillStyle = '#ffffff'; ctx.font = `bold ${sizeTexto}px Poppins`;
                ctx.shadowColor = 'rgba(0,0,0,0.6)'; ctx.shadowBlur = 6;
                ctx.fillText(participante, radius - (radius * 0.12), sizeTexto/3); ctx.restore();
            });
            
            ctx.beginPath(); ctx.arc(centerX, centerY, radius * 0.1, 0, 2 * Math.PI);
            ctx.fillStyle = '#0f0f15'; ctx.fill(); ctx.lineWidth = 5; ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.stroke();
        }

        function girarRuleta() {
            if (girando || participantes.length < 2) return;
            const duracion = 4000 + Math.random() * 2000; 
            const girosExtra = 4 + Math.random() * 3; 

            if (!isTV) localStorage.setItem('panda_sorteos_giro', JSON.stringify({ d: duracion, g: girosExtra, ts: Date.now() }));
            ejecutarGiroMatematico(duracion, girosExtra);
        }

        function ejecutarGiroMatematico(duracion, girosExtra) {
            girando = true;
            const anguloInicial = anguloActual; 
            const anguloObjetivo = anguloInicial + (girosExtra * 2 * Math.PI);
            const inicioTiempo = performance.now();

            function animar(tiempoActual) {
                const tiempoTranscurrido = tiempoActual - inicioTiempo;
                let progreso = tiempoTranscurrido / duracion;

                if (progreso >= 1) { anguloActual = anguloObjetivo; dibujarRuleta(); finalizarGiro(); return; }
                const easing = 1 - Math.pow(1 - progreso, 3.5); 
                anguloActual = anguloInicial + (anguloObjetivo - anguloInicial) * easing;
                dibujarRuleta(); requestAnimationFrame(animar);
            }
            requestAnimationFrame(animar);
        }

        function finalizarGiro() {
            girando = false;
            const arco = (2 * Math.PI) / participantes.length;
            const offsetPuntero = Math.PI / 2; 
            let anguloFinalNormalizado = anguloActual % (2 * Math.PI);
            if (anguloFinalNormalizado < 0) anguloFinalNormalizado += 2 * Math.PI;
            
            let indiceGanador = Math.floor((2 * Math.PI - (anguloFinalNormalizado + offsetPuntero) % (2 * Math.PI)) / arco) % participantes.length;
            if (indiceGanador < 0) indiceGanador += participantes.length;

            ultimoGanadorIndex = indiceGanador;
            document.getElementById('nombre-ganador').innerText = participantes[indiceGanador];
            document.getElementById('modal-overlay').style.display = 'flex';
            dispararConfeti();
        }

        function cerrarModalGanador() { document.getElementById('modal-overlay').style.display = 'none'; }

        const confetiCanvas = document.getElementById('confeti-canvas');
        const confetiCtx = confetiCanvas.getContext('2d');
        let particulas = []; let confetiAnimacionId;

        function resizeConfetiCanvas() { confetiCanvas.width = window.innerWidth; confetiCanvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeConfetiCanvas); resizeConfetiCanvas();

        function dispararConfeti() {
            particulas = [];
            for (let i = 0; i < 200; i++) { 
                particulas.push({
                    x: confetiCanvas.width / 2, y: confetiCanvas.height / 2 + 100, r: Math.random() * 8 + 4,
                    dx: Math.random() * 25 - 12.5, dy: Math.random() * -20 - 5, color: paletaColores[Math.floor(Math.random() * paletaColores.length)],
                    tilt: Math.floor(Math.random() * 10) - 10, tiltAngleInc: (Math.random() * 0.07) + 0.05, tiltAngle: 0
                });
            }
            if (!confetiAnimacionId) renderConfeti();
        }

        function renderConfeti() {
            confetiCtx.clearRect(0, 0, confetiCanvas.width, confetiCanvas.height);
            let particulasActivas = false;
            particulas.forEach((p) => {
                p.tiltAngle += p.tiltAngleInc; p.y += (Math.cos(p.tiltAngle) + 1 + p.r / 2) / 2;
                p.x += Math.sin(p.tiltAngle) * 2; p.dy += 0.2; p.y += p.dy; p.x += p.dx;
                if (p.y <= confetiCanvas.height) particulasActivas = true;
                confetiCtx.beginPath(); confetiCtx.lineWidth = p.r; confetiCtx.strokeStyle = p.color;
                confetiCtx.moveTo(p.x + p.tilt + p.r, p.y); confetiCtx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r); confetiCtx.stroke();
            });
            if (particulasActivas) { confetiAnimacionId = requestAnimationFrame(renderConfeti); } 
            else { cancelAnimationFrame(confetiAnimacionId); confetiAnimacionId = null; confetiCtx.clearRect(0, 0, confetiCanvas.width, confetiCanvas.height); }
        }

        ajustarCanvas();
        actualizarUI();
    </script>
</body>
