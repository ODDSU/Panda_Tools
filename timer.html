<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panda Tools - Timer Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* =========================================
           SISTEMA GRID PARA MÚLTIPLES RELOJES
           ========================================= */
        #timers-wrapper {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: grid; gap: 2vw; padding: 3vw; padding-bottom: 120px; box-sizing: border-box; z-index: 10;
            transition: all 0.3s ease;
        }
        
        .grid-1 { grid-template-columns: 1fr; grid-template-rows: 1fr; }
        .grid-2 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr; }
        .grid-3, .grid-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }

        .timer-instance {
            position: relative; display: flex; justify-content: center; align-items: center;
            border-radius: 30px; 
            background: rgba(0, 0, 0, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(4px); 
            transition: all 0.2s ease-out;
            cursor: pointer;
        }
        
        /* ESTADO SELECCIONADO */
        .timer-instance.is-selected {
            box-shadow: 0 0 0 2px rgba(255,255,255,0.8), 0 0 30px rgba(255,255,255,0.15) inset;
            transform: scale(1.02); z-index: 15;
            background: rgba(0, 0, 0, 0.15); 
        }

        .grid-1 .timer-instance { background: transparent; border: none; backdrop-filter: none; box-shadow: none !important; transform: none !important; cursor: default;}

        .grid-1 .timer-text { font-size: 27vw; }
        .grid-2 .timer-text { font-size: 15vw; }
        .grid-3 .timer-text, .grid-4 .timer-text { font-size: 11vw; }

        .timer-text {
            font-weight: bold; margin: 0; line-height: 1; color: transparent;
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
            font-family: monospace; transition: -webkit-text-stroke 0.4s;
            font-variant-numeric: tabular-nums; text-align: center; width: 100%;
            pointer-events: none;
        }

        /* ZONA HOVER SUPERIOR PARA EL TÍTULO FANTASMA */
        .timer-title-wrapper {
            position: absolute; top: 0; left: 0; width: 100%; height: 25%; z-index: 15;
        }
        .timer-title {
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            background: transparent; border: none; color: rgba(255,255,255,0.9);
            font-family: 'Poppins', sans-serif; font-weight: 900; text-align: center;
            text-transform: uppercase; outline: none; width: 80%;
            letter-spacing: 3px; transition: 0.3s; opacity: 0; pointer-events: none;
        }
        
        /* Si tiene texto escrito, se ve. Si está vacío, desaparece. */
        .timer-title:not(:placeholder-shown) { opacity: 1; pointer-events: auto; }
        
        /* Si acercas el ratón mucho por arriba, aparece */
        .timer-title-wrapper:hover .timer-title, .timer-title:focus { 
            opacity: 1; pointer-events: auto; border-bottom: 2px dashed rgba(255,255,255,0.4); 
        }

        .grid-1 .timer-title { font-size: 2.5vw; }
        .grid-2 .timer-title { font-size: 2vw; }
        .grid-3 .timer-title, .grid-4 .timer-title { font-size: 1.5vw; }
        
        .timer-instance { filter: drop-shadow(0px 0px 25px rgba(68, 156, 118, 0.2)); animation: subtle-glow-classic 4s infinite ease-in-out; }
        .timer-instance.palette-panda { filter: drop-shadow(0px 0px 25px rgba(139, 92, 246, 0.2)); animation: subtle-glow-panda 4s infinite ease-in-out; }
    </style>
</head>
<body>

    <!-- AURAS DE FONDO BASE -->
    <div class="bg-auras">
        <div class="aura aura-1"></div>
        <div class="aura aura-2"></div>
    </div>

    <video id="video-bg" src="fondo.mp4" autoplay loop muted playsinline></video>
    <canvas id="topoCanvas"></canvas>
    <div id="unified-bg"></div>

    <div id="timers-wrapper" class="grid-1" onclick="deselectAll(event)"></div>

    <img id="tbc-image" src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/1b/To_Be_Continued_Logo.svg/1024px-To_Be_Continued_Logo.svg.png" alt="To Be Continued">

    <!-- CONTROLES UNIFICADOS ORIGINALES -->
    <div id="hover-zone">
        <div id="controls">
            <!-- GRUPO 1: TIEMPO -->
            <div class="control-group">
                <input type="number" id="time-input" value="35" min="1" max="300">
                <span class="min-label">min</span>
                <button class="btn-primary btn-green" id="btn-apply" onclick="applyTime(); this.blur()">✔ Aplicar</button>
                <button class="btn-secondary" style="margin-left:10px; background: rgba(255,255,255,0.1); color: white;" onclick="addTimer(); this.blur()" title="Añadir otro torneo">➕ Reloj</button>
                <button class="btn-secondary" style="margin-left:5px; background: rgba(239, 68, 68, 0.1); color: #fca5a5; border-color: rgba(239, 68, 68, 0.3);" onclick="removeSelectedOrLast(); this.blur()" title="Eliminar reloj">➖ Quitar</button>
            </div>
            
            <!-- GRUPO 2: PLAY / PAUSA / RESET -->
            <div class="control-group">
                <button class="btn-primary btn-purple" onclick="playAction(); this.blur()">▶ Iniciar</button>
                <button class="btn-secondary" onclick="pauseAction(); this.blur()">⏸ Pausa</button>
                <button class="btn-primary btn-danger" id="btn-reset" onclick="resetAction(); this.blur()">🔄 Reiniciar</button>
            </div>
            
            <!-- GRUPO 3: PANTALLA Y CONFIG -->
            <div class="control-group" style="border: none; padding-right: 0;">
                <button class="btn-secondary" id="btn-tv" style="border-color: rgba(59, 130, 246, 0.4); color: #60a5fa;" onclick="openTV(); this.blur()" title="Abrir ventana espejo">📺 Abrir TV</button>
                <button class="btn-secondary" id="btn-fullscreen" onclick="toggleFullScreen(); this.blur()">⛶ Pantalla</button>
                <button class="btn-secondary" id="btn-settings" onclick="openSettings(); this.blur()">⚙️ Config</button>
            </div>
        </div>
    </div>

    <!-- MODAL DE CONFIGURACIÓN -->
    <div id="settings-overlay" onclick="closeSettings()"></div>
    <div id="settings-modal" class="modal-card">
        <h2>⚙️ PERSONALIZACIÓN</h2>
        
        <div class="setting-row">
            <label>Paleta de Colores:</label>
            <select id="palette-select">
                <option value="classic" selected>Clásica (Esmeralda / Oro)</option>
                <option value="panda">Panda Tools (Morado / Azul)</option>
            </select>
        </div>

        <div class="setting-row">
            <label>Estilo del Reloj:</label>
            <select id="theme-select" onchange="onThemeSelectChange()">
                <option value="memphis">Memphis 3D</option>
                <option value="puntos">Trama</option>
                <option value="puntos-animados">Trama Animada</option>
                <option value="logo">Logo Panda</option>
                <option value="logo2">Logo One Piece </option>
                <option value="logo3">Logo Konoha </option>
                <option value="glass">Cristal </option> 
                <option value="topo-org">Números Topográficos (Estático)</option>
                <option value="topo-org-moving" selected>Números Topográficos (Movimiento)</option>
            </select>
        </div>

        <div class="setting-row" id="logo-style-row">
            <label>Animación Logos:</label>
            <select id="logo-style-select">
                <option value="grid" selected>Cuadrícula Básica (Defecto)</option>
                <option value="smooth">Deslizamiento Suave</option>
                <option value="chaotic">Mosaico Caótico</option>
            </select>
        </div>

        <div class="setting-row">
            <label>Fondo de Pantalla:</label>
            <select id="bg-select" onchange="changeBackground()">
                <option value="topografico">Topográfico (Animado)</option>
                <option value="video">Balatro</option>
                <option value="negro">Negro Puro / Auras</option>
                <option value="unified">Topográfico Orgánico</option>
            </select>
        </div>

        <div class="setting-row" id="topo-slider-row">
            <label>Grosor Topográfico:</label>
            <input type="range" id="topo-thickness" min="0.5" max="6" step="0.5" value="2.5">
        </div>

        <div style="margin-top: 15px; background: rgba(0,0,0,0.3); border-radius: 12px; padding: 15px; border: 1px solid rgba(255,255,255,0.05);">
            <h3 style="margin: 0 0 10px 0; font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px;">⌨️ Atajos de Teclado Rápidos</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 12px; color: #cbd5e1;">
                <div><strong style="color: var(--primary);">[Espacio]</strong> Iniciar / Pausar</div>
                <div><strong style="color: var(--primary);">[R]</strong> Reiniciar Reloj</div>
                <div><strong style="color: var(--primary);">[F]</strong> Pantalla Completa</div>
                <div><strong style="color: var(--primary);">[Enter]</strong> Deseleccionar reloj</div>
                <div><strong style="color: var(--primary);">[Supr/Back]</strong> Borrar seleccionado</div>
                <div><strong style="color: var(--primary);">[Flechas ⬅ ➡]</strong> Mover selección</div>
                <div style="grid-column: span 2;"><strong style="color: var(--primary);">[Flechas ↑ / ↓]</strong> Sumar o restar 1 minuto</div>
            </div>
        </div>

        <div style="margin-top: 20px; display: flex; justify-content: flex-end;">
            <button class="btn-primary btn-purple" id="btn-close-settings" onclick="applySettingsModal(); this.blur()" style="width: 100%;">✔ Aplicar Configuración</button>
        </div>
    </div>

    <audio id="audio-warning" src="alarma.mp3"></audio>
    <audio id="audio-end" src="final.mp3"></audio>

    <script>
        let timers = [];
        let selectedTimerId = null; 
        let globalTimerInterval = null;

        const timeInput = document.getElementById('time-input');
        const themeSelect = document.getElementById('theme-select');
        const bgSelect = document.getElementById('bg-select');
        const logoStyleSelect = document.getElementById('logo-style-select');

        function init() {
            generateRandomTrama(); 
            generateTopoTextPattern();
            
            // Comprobar si hay estado de la red guardado previamente
            const stored = localStorage.getItem('panda_timer_sync');
            if (stored) {
                const data = JSON.parse(stored);
                if (data.timers && data.timers.length > 0) {
                    timers = data.timers;
                    selectedTimerId = data.selectedTimerId;
                    document.getElementById('bg-select').value = data.bg;
                    document.getElementById('topo-thickness').value = data.topoThickness;
                    currentTopoThickness = parseFloat(data.topoThickness);
                } else {
                    addTimer(false); // Creación limpia si el sync está corrupto
                }
            } else {
                addTimer(false); 
            }
            
            changeBackground(false); 
            setRandomMovementDirection();
            renderTimers();
            drawTopo();
            globalTimerInterval = setInterval(globalTick, 1000);
            
            // Listener Mágico para la Sincronización Doble Vía (PC <-> TV)
            window.addEventListener('storage', (e) => {
                if (e.key === 'panda_timer_sync') {
                    const data = JSON.parse(e.newValue);
                    if (data) {
                        timers = data.timers;
                        selectedTimerId = data.selectedTimerId;
                        
                        const bgSel = document.getElementById('bg-select');
                        const topoInp = document.getElementById('topo-thickness');
                        
                        if (bgSel.value !== data.bg || topoInp.value !== data.topoThickness) {
                            bgSel.value = data.bg;
                            topoInp.value = data.topoThickness;
                            currentTopoThickness = parseFloat(data.topoThickness);
                            changeBackground(false);
                        }
                        renderTimers();
                    }
                }
            });
        }

        // --- SISTEMA NETWORK ---
        // Empuja todo el estado de la aplicación para que la otra ventana lo copie
        function syncToNetwork() {
            const syncData = {
                timers: timers,
                selectedTimerId: selectedTimerId,
                bg: document.getElementById('bg-select').value,
                topoThickness: document.getElementById('topo-thickness').value
            };
            localStorage.setItem('panda_timer_sync', JSON.stringify(syncData));
        }

        function openTV() {
            window.open('timer.html', 'PandaTimerTV', 'width=1280,height=720');
        }

        // --- GESTIÓN DE RELOJES ---
        function addTimer(doSync = true) {
            if (timers.length >= 4) { alert("Límite de 4 torneos alcanzado."); return; }
            const newId = Date.now();
            timers.push({
                id: newId,
                title: "", // Nace sin título
                totalSeconds: parseInt(timeInput.value) * 60 || 35 * 60,
                timeLeft: parseInt(timeInput.value) * 60 || 35 * 60,
                isRunning: false,
                palette: 'classic',
                theme: 'topo-org-moving', 
                logoStyle: 'grid',
                warningTriggered: false
            });
            selectedTimerId = newId; 
            renderTimers();
            if(doSync) syncToNetwork();
        }

        function removeTimer(id) {
            timers = timers.filter(t => t.id !== id);
            if (selectedTimerId === id) selectedTimerId = null;
            renderTimers();
            syncToNetwork();
        }

        function removeSelectedOrLast() {
            if (timers.length <= 1) return;
            let idToRemove = selectedTimerId ? selectedTimerId : timers[timers.length - 1].id;
            removeTimer(idToRemove);
        }

        function deselectAll(event) {
            if (event.target.id === 'timers-wrapper') {
                selectedTimerId = null;
                updateTimerDisplays();
                syncToNetwork();
            }
        }

        function selectTimer(event, id) {
            if (['INPUT', 'BUTTON', 'SELECT'].includes(event.target.tagName)) return;
            event.stopPropagation(); 
            
            if (selectedTimerId === id) selectedTimerId = null;
            else selectedTimerId = id;
            
            if (selectedTimerId) {
                const t = timers.find(x => x.id === selectedTimerId);
                if (t) timeInput.value = Math.floor(t.totalSeconds / 60);
            }
            updateTimerDisplays();
            syncToNetwork();
        }

        function moveSelection(direction) {
            if (timers.length <= 1) return;
            if (!selectedTimerId) selectedTimerId = timers[0].id;
            else {
                let idx = timers.findIndex(t => t.id === selectedTimerId);
                idx += direction;
                if (idx < 0) idx = timers.length - 1;
                if (idx >= timers.length) idx = 0;
                selectedTimerId = timers[idx].id;
            }
            const t = timers.find(x => x.id === selectedTimerId);
            if (t) timeInput.value = Math.floor(t.totalSeconds / 60);
            updateTimerDisplays();
            syncToNetwork();
        }

        function renderTimers() {
            const wrapper = document.getElementById('timers-wrapper');
            wrapper.className = 'grid-' + timers.length;
            
            if (timers.length > 0 && timers[0].palette === 'panda') document.body.classList.add('palette-panda');
            else document.body.classList.remove('palette-panda');

            let htmlContent = '';
            timers.forEach(t => {
                let isWarning = t.timeLeft <= 300 && t.timeLeft > 0;
                let themeClasses = `theme-${t.theme}`;
                if (t.theme.startsWith('logo')) themeClasses += ` style-${t.logoStyle}`;

                const mins = Math.floor(t.timeLeft / 60).toString().padStart(2, '0');
                const secs = (t.timeLeft % 60).toString().padStart(2, '0');

                htmlContent += `
                    <div class="timer-instance palette-${t.palette}" id="timer-${t.id}" onclick="selectTimer(event, ${t.id})">
                        <div class="timer-title-wrapper">
                            <input type="text" class="timer-title" placeholder="Añadir Título..." value="${t.title}" onchange="updateTitle(${t.id}, this.value)">
                        </div>
                        <div class="timer-text ${themeClasses} ${isWarning ? 'warning-text' : ''}" id="timer-text-${t.id}">${mins}:${secs}</div>
                    </div>
                `;
            });
            wrapper.innerHTML = htmlContent;
            updateTimerDisplays(); 
        }

        function updateTimerDisplays() {
            timers.forEach(t => {
                const container = document.getElementById(`timer-${t.id}`);
                const textEl = document.getElementById(`timer-text-${t.id}`);
                if (!container || !textEl) return;

                if (t.id === selectedTimerId) container.classList.add('is-selected');
                else container.classList.remove('is-selected');

                const mins = Math.floor(t.timeLeft / 60).toString().padStart(2, '0');
                const secs = (t.timeLeft % 60).toString().padStart(2, '0');
                
                const newTime = `${mins}:${secs}`;
                if (textEl.textContent !== newTime) textEl.textContent = newTime;

                let isWarning = t.timeLeft <= 300 && t.timeLeft > 0;
                if (isWarning) { textEl.classList.add('warning-text'); container.classList.add('warning-container'); } 
                else { textEl.classList.remove('warning-text'); container.classList.remove('warning-container'); }

                if (t.timeLeft <= 10 && t.timeLeft > 0) container.classList.add('dramatic-vibe');
                else container.classList.remove('dramatic-vibe');
            });

            const anyFinished = timers.some(t => t.timeLeft === 0 && !t.isRunning);
            document.getElementById('tbc-image').style.display = (anyFinished && timers.length === 1) ? 'block' : 'none';
        }

        function globalTick() {
            let changed = false;
            timers.forEach(t => {
                if (t.isRunning && t.timeLeft > 0) {
                    t.timeLeft--; changed = true;
                    if (t.timeLeft === 300 && !t.warningTriggered) { document.getElementById('audio-warning').play().catch(()=>{}); t.warningTriggered = true; }
                    if (t.timeLeft === 0) { t.isRunning = false; document.getElementById('audio-end').play().catch(()=>{}); }
                }
            });
            // Nota: No lanzamos syncToNetwork() aquí cada segundo para no sobrecargar el localStorage.
            if (changed) updateTimerDisplays();
        }

        // --- ACCIONES DE LA BARRA INFERIOR ---
        function applyTime() {
            let newMinutes = parseInt(timeInput.value);
            if (isNaN(newMinutes) || newMinutes <= 0) return;
            
            if (selectedTimerId) {
                let t = timers.find(x => x.id === selectedTimerId);
                t.totalSeconds = newMinutes * 60; t.timeLeft = t.totalSeconds; t.isRunning = false; t.warningTriggered = false;
            } else {
                timers.forEach(t => { t.totalSeconds = newMinutes * 60; t.timeLeft = t.totalSeconds; t.isRunning = false; t.warningTriggered = false; });
            }
            setRandomMovementDirection(); updateTimerDisplays(); syncToNetwork();
        }

        function playAction() {
            if (selectedTimerId) {
                let t = timers.find(x => x.id === selectedTimerId);
                if (t) { t.isRunning = !t.isRunning; document.getElementById('tbc-image').style.display = 'none'; }
            } else {
                const anyRunning = timers.some(t => t.isRunning);
                timers.forEach(t => { if(t.timeLeft > 0) t.isRunning = !anyRunning; });
                document.getElementById('tbc-image').style.display = 'none';
            }
            updateTimerDisplays(); syncToNetwork();
        }

        function pauseAction() {
            if (selectedTimerId) {
                let t = timers.find(x => x.id === selectedTimerId);
                if (t) t.isRunning = false;
            } else {
                timers.forEach(t => t.isRunning = false);
            }
            updateTimerDisplays(); syncToNetwork();
        }

        function resetAction() {
            if (selectedTimerId) {
                let t = timers.find(x => x.id === selectedTimerId);
                if (t) { t.isRunning = false; t.timeLeft = t.totalSeconds; t.warningTriggered = false; }
            } else {
                timers.forEach(t => { t.isRunning = false; t.timeLeft = t.totalSeconds; t.warningTriggered = false; });
            }
            updateTimerDisplays(); syncToNetwork();
        }

        function updateTitle(id, val) { const t = timers.find(x => x.id === id); if (t) { t.title = val; updateTimerDisplays(); syncToNetwork(); } }

        // --- ATAJOS DE TECLADO RÁPIDOS Y CORREGIDOS ---
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                if (document.activeElement) document.activeElement.blur();
                selectedTimerId = null;
                updateTimerDisplays();
                syncToNetwork();
                return;
            }

            if (['INPUT', 'SELECT', 'TEXTAREA'].includes(event.target.tagName)) return;
            
            switch(event.code) {
                case 'Space': event.preventDefault(); playAction(); break;
                case 'KeyR': resetAction(); break;
                case 'KeyF': toggleFullScreen(); break;
                case 'KeyS': 
                    const modalOverlay = document.getElementById('settings-overlay');
                    if(modalOverlay.style.display === 'block') closeSettings();
                    else openSettings();
                    break;
                case 'Backspace': 
                case 'Delete': 
                    removeSelectedOrLast();
                    break;
                case 'ArrowRight': event.preventDefault(); moveSelection(1); break;
                case 'ArrowLeft': event.preventDefault(); moveSelection(-1); break;
                case 'ArrowUp':
                    event.preventDefault();
                    timeInput.value = parseInt(timeInput.value || 0) + 1;
                    applyTime();
                    break;
                case 'ArrowDown':
                    event.preventDefault();
                    if (parseInt(timeInput.value) > 1) {
                        timeInput.value = parseInt(timeInput.value) - 1;
                        applyTime();
                    }
                    break;
            }
        });

        // --- MODAL DE CONFIGURACIÓN ---
        function openSettings() {
            if (selectedTimerId) {
                const t = timers.find(x => x.id === selectedTimerId);
                document.getElementById('palette-select').value = t.palette;
                document.getElementById('theme-select').value = t.theme;
                document.getElementById('logo-style-select').value = t.logoStyle;
            }
            onThemeSelectChange(); 
            document.getElementById('settings-overlay').style.display = 'block';
            document.getElementById('settings-modal').style.display = 'flex';
        }

        function closeSettings() { document.getElementById('settings-overlay').style.display = 'none'; document.getElementById('settings-modal').style.display = 'none'; }
        
        function onThemeSelectChange() {
            const theme = document.getElementById('theme-select').value;
            const logoRow = document.getElementById('logo-style-row');
            if (theme.startsWith('logo')) { logoRow.style.opacity = '1'; document.getElementById('logo-style-select').disabled = false; } 
            else { logoRow.style.opacity = '0.3'; document.getElementById('logo-style-select').disabled = true; }
        }

        function applySettingsModal() {
            let p = document.getElementById('palette-select').value;
            let th = document.getElementById('theme-select').value;
            let ls = document.getElementById('logo-style-select').value;
            
            if (selectedTimerId) {
                let t = timers.find(x => x.id === selectedTimerId);
                if (t) { t.palette = p; t.theme = th; t.logoStyle = ls; }
            } else {
                timers.forEach(t => { t.palette = p; t.theme = th; t.logoStyle = ls; });
            }

            currentTopoThickness = parseFloat(document.getElementById('topo-thickness').value);
            changeBackground();
            closeSettings(); 
            setRandomMovementDirection(); 
            renderTimers(); 
            syncToNetwork();
        }

        function toggleFullScreen() { if (!document.fullscreenElement) { document.documentElement.requestFullscreen().catch(()=>{}); } else { if (document.exitFullscreen) document.exitFullscreen(); } }

        let mouseTimeout;
        document.onmousemove = function() { document.body.style.cursor = 'default'; clearTimeout(mouseTimeout); mouseTimeout = setTimeout(function() { document.body.style.cursor = 'none'; }, 2500); };

        // --- CÓDIGO VISUAL ORIGINAL (FONDOS / SVG) ---
        function generateRandomTrama() {
            let svg = "<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'>";
            for(let x = 0; x < 200; x += 20) {
                for(let y = 0; y < 200; y += 20) {
                    let dur = (Math.random() * 2 + 2).toFixed(1); let delay = (Math.random() * 5).toFixed(1);
                    svg += `<circle cx='${x + 10}' cy='${y + 10}' r='2' fill='rgba(0,0,0,0.45)'><animate attributeName='r' values='1.5; 3.5; 1.5' dur='${dur}s' begin='-${delay}s' repeatCount='indefinite' /></circle>`;
                }
            }
            svg += "</svg>";
            document.documentElement.style.setProperty('--trama-pattern', `url("data:image/svg+xml,${encodeURIComponent(svg)}")`);
        }

        function generateTopoTextPattern() {
            let svgBase = `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 400' width='400' height='400'>
                <filter id='warp' x='-20%' y='-20%' width='140%' height='140%'><feTurbulence type='fractalNoise' baseFrequency='0.012' numOctaves='2' seed='5' result='noise'/><feDisplacementMap in='SourceGraphic' in2='noise' scale='100' xChannelSelector='R' yChannelSelector='G'/></filter>
                <g filter='url(#warp)' fill='none' stroke='COLOR_VAR' stroke-width='4'>
                    <g><animateTransform attributeName='transform' type='rotate' from='0 200 200' to='360 200 200' dur='25s' repeatCount='indefinite' /><circle cx='215' cy='200' r='30' /><circle cx='185' cy='200' r='90' /><circle cx='225' cy='200' r='150' /><circle cx='175' cy='200' r='210' /><circle cx='235' cy='200' r='270' /><circle cx='165' cy='200' r='330' /></g>
                    <g><animateTransform attributeName='transform' type='rotate' from='360 200 200' to='0 200 200' dur='37s' repeatCount='indefinite' /><circle cx='200' cy='220' r='60' /><circle cx='200' cy='180' r='120' /><circle cx='200' cy='230' r='180' /><circle cx='200' cy='170' r='240' /><circle cx='200' cy='240' r='300' /><circle cx='200' cy='160' r='360' /></g>
                </g></svg>`;
            document.documentElement.style.setProperty('--topo-org-classic', `url("data:image/svg+xml,${encodeURIComponent(svgBase.replace('COLOR_VAR', 'rgba(139, 214, 133, 0.6)').replace(/\s+/g, " "))}")`);
            document.documentElement.style.setProperty('--topo-org-panda', `url("data:image/svg+xml,${encodeURIComponent(svgBase.replace('COLOR_VAR', 'rgba(139, 92, 246, 0.6)').replace(/\s+/g, " "))}")`);
            document.documentElement.style.setProperty('--topo-org-warning', `url("data:image/svg+xml,${encodeURIComponent(svgBase.replace('COLOR_VAR', 'rgba(255, 234, 0, 0.7)').replace(/\s+/g, " "))}")`);
        }

        const canvas = document.getElementById('topoCanvas');
        const ctx = canvas.getContext('2d');
        let width, height; let topoTime = 0; const lineCount = 15; const step = 25; const speed = 0.005; let isTopoRunning = true; let currentTopoThickness = 2.5;

        function resizeCanvas() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
        function noise(x, y, t) { return Math.sin(x * 0.002 + t) * Math.cos(y * 0.002 - t) + Math.sin(x * 0.005 + y * 0.002 + t * 0.5) * 0.5; }

        function drawTopo() {
            if (!isTopoRunning) return; 
            ctx.clearRect(0, 0, width, height);
            const anyWarning = timers.some(t => t.timeLeft <= 300 && t.timeLeft > 0);
            const anyPanda = timers.some(t => t.palette === 'panda');
            ctx.strokeStyle = anyWarning ? 'rgba(255, 51, 51, 0.4)' : (anyPanda ? 'rgba(139, 92, 246, 0.3)' : 'rgba(68, 156, 118, 0.3)'); 
            topoTime += (anyWarning ? speed * 3 : speed); ctx.lineWidth = currentTopoThickness; ctx.lineCap = 'round'; 

            for (let i = 0; i < lineCount; i++) {
                const threshold = (i / lineCount) * 2 - 1; 
                ctx.beginPath();
                for (let x = 0; x < width; x += step) {
                    for (let y = 0; y < height; y += step) {
                        if (Math.abs(noise(x, y, topoTime) - threshold) < 0.1) { ctx.moveTo(x, y); ctx.lineTo(x + 2, y + 2); }
                    }
                }
                ctx.stroke();
            }
            requestAnimationFrame(drawTopo);
        }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        function changeBackground(doSync = true) {
            const bgSel = document.getElementById('bg-select'); const video = document.getElementById('video-bg'); const unifiedBg = document.getElementById('unified-bg');
            const sliderRow = document.getElementById('topo-slider-row');
            unifiedBg.style.display = 'none'; canvas.style.display = 'none'; video.style.display = 'none'; video.pause(); isTopoRunning = false;
            
            if (bgSel.value === 'negro') { sliderRow.style.opacity = '0.3'; document.getElementById('topo-thickness').disabled = true; }
            else if (bgSel.value === 'video') { video.style.display = 'block'; video.play(); sliderRow.style.opacity = '0.3'; document.getElementById('topo-thickness').disabled = true; } 
            else if (bgSel.value === 'unified') { unifiedBg.style.display = 'block'; sliderRow.style.opacity = '0.3'; document.getElementById('topo-thickness').disabled = true; } 
            else if (bgSel.value === 'topografico') { canvas.style.display = 'block'; isTopoRunning = true; drawTopo(); sliderRow.style.opacity = '1'; document.getElementById('topo-thickness').disabled = false; }
            if (doSync) syncToNetwork();
        }

        function getDir() { let d = 0; while(d === 0) d = Math.floor(Math.random() * 3) - 1; return d; }
        function setRandomMovementDirection() {
            let mx_base = getDir(), my_base = getDir(); document.documentElement.style.setProperty('--move-x-base', (mx_base * 150) + 'px'); document.documentElement.style.setProperty('--move-y-base', (my_base * 150) + 'px');
            let mx_overlay = 0, my_overlay = 0; while ((mx_overlay === 0 && my_overlay === 0) || (mx_overlay === mx_base && my_overlay === my_base)) { mx_overlay = getDir(); my_overlay = getDir(); }
            document.documentElement.style.setProperty('--move-x-overlay', (mx_overlay * 600) + 'px'); document.documentElement.style.setProperty('--move-y-overlay', (my_overlay * 600) + 'px');
            document.documentElement.style.setProperty('--move-x-puntos', (getDir() * 20) + 'px'); document.documentElement.style.setProperty('--move-y-puntos', (getDir() * 20) + 'px');
            document.documentElement.style.setProperty('--move-x-topo', (getDir() * 300) + 'px'); document.documentElement.style.setProperty('--move-y-topo', (getDir() * 300) + 'px');
            let m_x = getDir(), m_y = getDir(); document.documentElement.style.setProperty('--move-x-logo', (m_x * 240) + 'px'); document.documentElement.style.setProperty('--move-y-logo', (m_y * 240) + 'px');
        }

        init();
    </script>
</body>
</html>
